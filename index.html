<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrikeTime</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>TrikeTime</h1>
    <p id="shift-status">Смена не начата</p>
    <button onclick="startShift()">Начать смену</button>

    <h2>История смен</h2>
    <button onclick="clearHistory()">Очистить историю</button>
    <button onclick="downloadHistory()">Скачать историю (CSV)</button>

    <!-- Дорога -->
    <div class="road">
        <div class="lane-markings"></div>
    </div>

    <script>
        function startShift() {
            document.getElementById("shift-status").textContent = "Смена начата!";
            alert("Смена начата!");
        }

        function clearHistory() {
            alert("История очищена (заглушка)");
        }

        function downloadHistory() {
            alert("Скачивание CSV (заглушка)");
        }
    </script>
</body>
</html>
